packages = [
    "caelestia-shell",
    "caelestia-cli",

    # WM & portals
    "hyprland",
    "xdg-desktop-portal-hyprland",
    "xdg-desktop-portal-gtk",

    # System
    "networkmanager",
    "wireplumber",
    "gnome-keyring",
    "polkit-gnome",

    # Clipboard
    "wl-clipboard",
    "cliphist",

    # Theming
    "adw-gtk-theme",
    "papirus-icon-theme",
    "qtengine",
    "darkly-bin",

    # Fonts
    "ttf-rubik-vf",
    "ttf-jetbrains-mono-nerd",

    # Tools
    "starship",
    "fastfetch",
    "fish",
    "curl",
    "git",
    "trash-cli",
    "eza",
    "jq",
    "zoxide",
    "direnv",
    "btop",
    "lazygit",
    "bat",
    "micro",
    "ripgrep",
    "ydotool",
    "hyprpicker",
    "xdg-user-dirs",
]
post_install = [
    "xdg-user-dirs-update",
    "test -f ${XDG_STATE_HOME:-$HOME/.local/state}/caelestia/scheme.json || caelestia scheme set -n caelestia",
    "caelestia shell -d >/dev/null",
]
post_update = ["caelestia shell -k && sleep 1 && caelestia shell -d >/dev/null"]

# --- Core components ---

[[components]]
name = "hypr"
default = true
packages = ["hyprland"]
post_install = [
    "chmod u+x ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/scripts/wsaction.fish",
    "hyprctl reload >/dev/null",
]
post_update = ["hyprctl reload >/dev/null"]
[[components.entries]]
src = "hypr"
dest = "$XDG_CONFIG_HOME/hypr"

[[components]]
name = "fish"
default = true
packages = ["fish"]
[[components.entries]]
src = "fish"
dest = "$XDG_CONFIG_HOME/fish"

[[components]]
name = "foot"
default = true
packages = ["foot"]
[[components.entries]]
src = "foot"
dest = "$XDG_CONFIG_HOME/foot"

[[components]]
name = "fastfetch"
default = true
packages = ["fastfetch"]
[[components.entries]]
src = "fastfetch"
dest = "$XDG_CONFIG_HOME/fastfetch"

[[components]]
name = "btop"
default = true
packages = ["btop"]
post_install = ["killall -USR2 btop 2>/dev/null || true"]
post_update = ["killall -USR2 btop 2>/dev/null || true"]
[[components.entries]]
src = "btop"
dest = "$XDG_CONFIG_HOME/btop"

[[components]]
name = "micro"
default = true
packages = ["micro"]
[[components.entries]]
src = "micro"
dest = "$XDG_CONFIG_HOME/micro"

[[components]]
name = "thunar"
default = true
packages = ["thunar"]
[[components.entries]]
src = "thunar"
dest = "$XDG_CONFIG_HOME/Thunar"

[[components]]
name = "starship"
default = true
packages = ["starship"]
[[components.entries]]
src = "starship.toml"
dest = "$XDG_CONFIG_HOME/starship.toml"

[[components]]
name = "firefox"
default = true
packages = ["firefox", "local:packages/caelestia-firefox-theme"]


# --- Optional components ---

[[components]]
name = "spotify"
packages = ["spotify", "spicetify-cli", "spicetify-marketplace-bin"]
post_install = [
    "spicetify config current_theme caelestia color_scheme caelestia custom_apps marketplace",
    "spicetify apply",
]
[[components.entries]]
src = "spicetify"
dest = "$XDG_CONFIG_HOME/spicetify"

[[components]]
name = "vscodium"
packages = ["vscodium-bin", "vscodium-bin-marketplace"]
post_install = [
    "codium --install-extension $CAELESTIA_DOTS/vscode/caelestia-vscode-integration/caelestia-vscode-integration-*.vsix",
]
[[components.entries]]
src = "vscode/settings.json"
dest = "$XDG_CONFIG_HOME/VSCodium/User/settings.json"
[[components.entries]]
src = "vscode/keybindings.json"
dest = "$XDG_CONFIG_HOME/VSCodium/User/keybindings.json"
[[components.entries]]
src = "vscode/flags.conf"
dest = "$XDG_CONFIG_HOME/codium-flags.conf"

[[components]]
name = "vscode"
packages = ["code"]
post_install = [
    "code --install-extension $CAELESTIA_DOTS/vscode/caelestia-vscode-integration/caelestia-vscode-integration-*.vsix",
]
[[components.entries]]
src = "vscode/settings.json"
dest = "$XDG_CONFIG_HOME/Code/User/settings.json"
[[components.entries]]
src = "vscode/keybindings.json"
dest = "$XDG_CONFIG_HOME/Code/User/keybindings.json"
[[components.entries]]
src = "vscode/flags.conf"
dest = "$XDG_CONFIG_HOME/code-flags.conf"

[[components]]
name = "zed"
packages = ["zed"]
[[components.entries]]
src = "zed"
dest = "$XDG_CONFIG_HOME/zed"

[[components]]
name = "discord"
packages = ["equibop"]

[[components]]
name = "todoist"
packages = ["todoist-appimage"]

[[components]]
name = "uwsm"
packages = ["uwsm"]
[[components.entries]]
src = "uwsm"
dest = "$XDG_CONFIG_HOME/uwsm"

