# ############# Font #############
font_family      family="Maple Mono NF"
bold_font        auto
italic_font      auto
bold_italic_font auto

# ############# Cursor #############
cursor_shape beam
cursor_beam_thickness 1.5

# ############# Scrollback #############
scrollback_lines 10000

# ############# Window #############
window_padding_width 0
adjust_column_width 0
background_opacity 0.6

# ############# Shell #############
shell fish

# ############# Keybinds #############
map shift+enter send_text all \e\r
