name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fish-action/install-fish@v1
      - run: fish -n install.fish
      - run: fish -n hypr/scripts/wsaction.fish
      - run: fish -n hypr/scripts/configs.fish
      - run: fish -n zen/native_app/app.fish

  css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npx stylelint "**/*.css" --allow-empty-input
        continue-on-error: true
